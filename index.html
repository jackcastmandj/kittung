<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Gift ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;
    background:white;
}

/* หน้าแรก */
.container{
    width:100%;
    max-width:900px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:20px;
    text-align:center;
}

/* หัวข้อ */
.title{
    font-size:clamp(28px, 5vw, 60px);
    font-weight:bold;
    margin-bottom:20px;
}

/* รูปหมา */
.dog{
    width:min(60vw, 280px);
    height:auto;
    margin-bottom:25px;

    object-fit:contain;
    user-select:none;
    pointer-events:none;
}

/* ปุ่ม */
.buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

/* style ปุ่ม */
button{
    border:none;

    padding:14px 32px;

    font-size:clamp(18px, 2vw, 28px);

    border-radius:18px;

    background:#0057ff;
    color:white;

    font-weight:bold;
    cursor:pointer;

    transition:0.2s;
}

button:hover{
    transform:scale(1.08);
}

/* หน้า video */
#videoPage{
    display:none;

    position:fixed;
    inset:0;

    width:100%;
    height:100%;

    background:black;

    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* video เต็มจอ */
#video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ข้อความ */
.yay{
    position:absolute;

    top:5%;
    left:50%;
    transform:translateX(-50%);

    color:white;

    font-size:clamp(24px, 5vw, 60px);

    font-weight:bold;

    z-index:10;

    text-shadow:0 0 20px pink;
}


/* มือถือ */
@media (max-width:600px){

    .buttons{
        gap:12px;
    }

    button{
        padding:12px 24px;
    }

    .dog{
        width:min(75vw, 260px);
    }

}

</style>
</head>

<body>

<!-- หน้าแรก -->
<div class="container" id="mainPage">

    <div class="title">
        PLS ACCEPT THE GIFT
    </div>

    <img src="dog.png" class="dog">

    <div class="buttons">
        <button onclick="acceptGift()">YES</button>
        <button id="noBtn">NO</button>
    </div>

</div>

<!-- หน้า video -->
<div id="videoPage">

    <div class="yay">
        ❤️
    </div>

    <video id="video" autoplay playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

</div>

<!-- เพลง -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script>

const noBtn = document.getElementById("noBtn");


// ปุ่ม NO วิ่งหนี
noBtn.addEventListener("mouseover", () => {

    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);

    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

});


// YES
function acceptGift(){

    openFullscreen();

    document.getElementById("mainPage").style.display = "none";

    document.getElementById("videoPage").style.display = "flex";

    document.getElementById("video").play();

    document.getElementById("bgMusic").play();
}


// fullscreen
function openFullscreen(){

    let elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    }

    else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    }

    else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}

</script>

</body>
</html>
