<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Gift ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:white;
    font-family:Arial, sans-serif;
}

/* หน้าแรก */
.container{

    width:100%;
    max-width:900px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:20px;
}

/* หัวข้อ */
.title{

    font-size:clamp(30px, 5vw, 60px);
    font-weight:bold;

    margin-bottom:20px;
}

/* รูปหมา */
.dog{

    width:min(70vw, 280px);
    height:auto;

    object-fit:contain;

    margin-bottom:25px;

    user-select:none;
    pointer-events:none;
}

/* ปุ่ม */
.buttons{

    display:flex;
    gap:20px;

    flex-wrap:wrap;
    justify-content:center;
}

/* ปุ่ม */
button{

    border:none;

    padding:14px 34px;

    border-radius:18px;

    font-size:clamp(18px, 2vw, 28px);

    font-weight:bold;

    cursor:pointer;

    background:#0057ff;
    color:white;

    transition:0.2s;
}

button:hover{
    transform:scale(1.08);
}

/* video page */
#videoPage{

    display:none;

    position:fixed;
    inset:0;

    width:100%;
    height:100%;

    background:black;

    justify-content:center;
    align-items:center;

    overflow:hidden;

    z-index:9999;
}

/* video */
#video{

    width:100vw;
    height:100vh;

    object-fit:contain;

    background:black;
}

/* yay */
.yay{

    position:absolute;

    top:5%;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:clamp(25px, 5vw, 60px);

    font-weight:bold;

    z-index:100;

    text-shadow:0 0 20px pink;
}

/* มือถือแนวตั้ง */
#rotateMessage{

    display:none;

    position:fixed;
    inset:0;

    background:black;
    color:white;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:30px;

    font-size:clamp(24px, 5vw, 40px);

    z-index:999999;
}

/* ถ้าเป็นมือถือแนวตั้ง */
@media screen and (orientation: portrait){

    #rotateMessage{
        display:flex;
    }

}

</style>
</head>

<body>

<!-- แจ้งเตือนหมุนจอ -->
<div id="rotateMessage">
    📱 กรุณาหมุนมือถือแนวนอน
</div>

<!-- หน้าแรก -->
<div class="container" id="mainPage">

    <div class="title">
        PLS ACCEPT THE GIFT
    </div>

    <img src="dog.png" class="dog">

    <div class="buttons">

        <button onclick="acceptGift()">
            YES
        </button>

        <button id="noBtn">
            NO
        </button>

    </div>

</div>

<!-- หน้า video -->
<div id="videoPage">

    <div class="yay">
        😘❤️
    </div>

    <video
        id="video"
        autoplay
        playsinline
        controls
    >
        <source src="video.mp4" type="video/mp4">
    </video>

</div>

<script>

const noBtn = document.getElementById("noBtn");


// ปุ่ม NO วิ่งหนี
noBtn.addEventListener("mouseover", () => {

    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);

    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.position = "absolute";

    noBtn.style.left = x + "px";

    noBtn.style.top = y + "px";

});




// ล็อกแนวนอน
async function lockLandscape(){

    try{

        // fullscreen
        if(document.documentElement.requestFullscreen){
            await document.documentElement.requestFullscreen();
        }

        // landscape
        if(screen.orientation && screen.orientation.lock){
            await screen.orientation.lock("landscape");
        }

    }catch(err){

        console.log(err);

    }

}



// กด YES
async function acceptGift(){

    await lockLandscape();

    // ซ่อนหน้าแรก
    document.getElementById("mainPage").style.display = "none";

    // แสดง video
    document.getElementById("videoPage").style.display = "flex";

    // เล่น video
    const video = document.getElementById("video");

    video.play();

}

</script>

</body>
</html>
